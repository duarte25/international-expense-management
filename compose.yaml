services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iem-app
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres_iem
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-international_expense_management}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "8000:8000"
    depends_on:
      postgres_iem:
        condition: service_healthy
    networks:
      - iem_net

  postgres_iem:
    image: postgres:16-alpine
    container_name: iem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-international_expense_management}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${PG_HOST_PORT:-5433}:5432"
    volumes:
      - iem_pg_data:/var/lib/postgresql/data
    networks:
      - iem_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-international_expense_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  iem_pg_data:
    driver: local

networks:
  iem_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.250.37.0/24
