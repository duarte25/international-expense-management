services:
  postgres_iem:
    image: postgres:16-alpine
    container_name: iem-postgres
    restart: unless-stopped
    network_mode: bridge
    environment:
      POSTGRES_DB: ${DB_DATABASE:-international_expense_management}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${PG_HOST_PORT:-5433}:5432"
    volumes:
      - iem_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-international_expense_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  iem_pg_data:
    driver: local
